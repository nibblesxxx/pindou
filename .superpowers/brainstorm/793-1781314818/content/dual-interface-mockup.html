<h2>拼豆助手 — 双界面设计预览</h2>
<p class="subtitle">白色简洁风格，每个色号以真实颜色标注</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">界面一：色号仓库</div>
    <div class="mockup-body" style="padding:16px;background:#fff;font-family:system-ui,sans-serif;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-weight:700;font-size:16px;color:#333;">📦 色号仓库</span>
        <div style="display:flex;gap:8px;">
          <button class="mock-button" style="font-size:12px;">📥 导入CSV</button>
          <button class="mock-button" style="font-size:12px;">📤 导出CSV</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input class="mock-input" placeholder="🔍 搜索色号或名称..." style="flex:1;font-size:12px;">
      </div>
      <!-- Color grid -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px;max-height:240px;overflow-y:auto;">
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(250,244,200);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A1</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 500</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(247,124,49);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A10</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 200</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(255,221,153);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A11</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 0</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(254,159,114);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A12</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 300</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(255,195,101);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A13</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 150</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(253,84,61);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">A14</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 0</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(0,0,0);border-radius:4px;margin-bottom:3px;"></div>
          <span style="font-size:10px;font-weight:600;">H7</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 1000</span>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
          <div style="width:100%;aspect-ratio:1;background:rgb(255,255,255);border-radius:4px;margin-bottom:3px;border:1px solid #ddd;"></div>
          <span style="font-size:10px;font-weight:600;">T1</span>
          <span style="font-size:9px;color:#888;display:block;">库存: 800</span>
        </div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#999;">共 291 种色号 | 点击色块修改库存</div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">界面二：图转色号统计</div>
    <div class="mockup-body" style="padding:16px;background:#fff;font-family:system-ui,sans-serif;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-weight:700;font-size:16px;color:#333;">🎨 图转色号</span>
        <button class="mock-button" style="font-size:12px;background:#f44336;color:#fff;">↩ 撤销上次扣除</button>
      </div>
      <!-- Upload area -->
      <div style="border:2px dashed #ddd;border-radius:10px;padding:24px;text-align:center;margin-bottom:12px;background:#fafafa;">
        <span style="font-size:32px;">🖼️</span>
        <p style="margin:6px 0;font-size:13px;color:#666;">拖拽拼豆截图到此处，或点击上传</p>
        <p style="font-size:11px;color:#aaa;">支持 PNG / JPG / WebP</p>
      </div>
      <!-- Matched results preview -->
      <div style="font-size:12px;font-weight:600;color:#333;margin-bottom:6px;">识别结果预览：</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:4px;max-height:150px;overflow-y:auto;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:#f9f9f9;border-radius:4px;">
          <div style="width:16px;height:16px;border-radius:3px;background:rgb(250,244,200);flex-shrink:0;"></div>
          <span style="font-size:10px;">A1</span>
          <span style="font-size:10px;color:#888;margin-left:auto;">×42</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:#f9f9f9;border-radius:4px;">
          <div style="width:16px;height:16px;border-radius:3px;background:rgb(247,124,49);flex-shrink:0;"></div>
          <span style="font-size:10px;">A10</span>
          <span style="font-size:10px;color:#888;margin-left:auto;">×18</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:#f9f9f9;border-radius:4px;">
          <div style="width:16px;height:16px;border-radius:3px;background:rgb(0,0,0);flex-shrink:0;"></div>
          <span style="font-size:10px;">H7</span>
          <span style="font-size:10px;color:#888;margin-left:auto;">×156</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:#fff3cd;border-radius:4px;border:1px solid #ffc107;">
          <div style="width:16px;height:16px;border-radius:3px;background:rgb(248,236,49);flex-shrink:0;"></div>
          <span style="font-size:10px;">R4</span>
          <span style="font-size:10px;color:#d32f2f;margin-left:auto;">库存不足!</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="mock-button" style="flex:1;font-size:12px;background:#4caf50;color:#fff;">✅ 确认扣除 (<b>216</b> 颗)</button>
        <button class="mock-button" style="font-size:12px;">🔄 重新识别</button>
      </div>
    </div>
  </div>
</div>
